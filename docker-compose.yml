services:
  backend-node:
    build: ./backend-node
    container_name: backend_node
    ports:
      - "4500:4500"
    environment:
      - NODE_ENV=production
    networks:
      - meshly_network

  backend-rust:
    build: ./backend-rust
    container_name: backend_rust
    ports:
      - "5000:5000"
    networks:
      - meshly_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend-node
      - backend-rust
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - meshly_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - meshly_network

  k6:
    image: grafana/k6:latest
    container_name: k6
    volumes:
      - ./k6:/scripts
    working_dir: /scripts
    entrypoint: [
      "k6",
      "run",
      "--out", "influxdb=http://influxdb:8086/k6",
      "test.js"
    ]
    depends_on:
      - backend-node
      - backend-rust
      - influxdb
    networks:
      - meshly_network

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - meshly_network


networks:
  meshly_network:
    driver: bridge

volumes:
  grafana_data:
  influxdb_data:
